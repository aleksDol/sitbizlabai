services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d app"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ./.env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"

  analyzer-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ./.env
    environment:
      PORT: ${PORT:-5051}
    ports:
      - "5051:5051"

  analyzer-client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5051}
    restart: always
    depends_on:
      - analyzer-server
    ports:
      - "5173:5173"

volumes:
  postgres_data:
